services:
  postgres:
    image: postgres:15-alpine
    container_name: textile_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: textile_billing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - textile-network

  backend:
    build: ./backend
    container_name: textile_backend
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: textile_billing
      PORT: 5000
      JWT_SECRET: your_jwt_secret_key_here
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    networks:
      - textile-network
    volumes:
      - ./backend:/app/backend
      - /app/backend/node_modules

  frontend:
    build: ./frontend
    container_name: textile_frontend
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - textile-network

volumes:
  postgres_data:

networks:
  textile-network:
    driver: bridge
